version: 2.1

jobs:

  # ── JOB 1: Run Tests ──────────────────────────
  test:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r requirements.txt
      - run:
          name: Run tests
          command: pytest tests/ -v

  # ── JOB 2: Check Submission ───────────────────
  check-submission:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r requirements.txt
      - run:
          name: Run Assignment Checker
          command: python checker/generate_report.py
      - run:
          name: Show results
          command: cat dashboard/results.json
      - persist_to_workspace:
          root: .
          paths:
            - dashboard/results.json

  # ── JOB 3: Build & Push Docker Image ──────────
  build-and-push:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - attach_workspace:
          at: .
      - setup_remote_docker:
          docker_layer_caching: false
      - run:
          name: Build and Push Docker image
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker build -t "$DOCKER_USERNAME/assignment-checker:latest" .
            docker push "$DOCKER_USERNAME/assignment-checker:latest"

  # ── JOB 4: Deploy to Render ───────────────────
  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - run:
          name: Deploy to Render
          command: curl -X POST $RENDER_DEPLOY_HOOK_URL

  # ── JOB 5: Send Slack Notification ───────────
  notify:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Install requests
          command: pip install requests -q
      - run:
          name: Send Slack Notification
          command: python notify.py

# ── WORKFLOW ───────────────────────────────────
workflows:
  assignment-pipeline:
    jobs:
      - test
      - check-submission:
          requires:
            - test
      - build-and-push:
          requires:
            - check-submission
      - deploy:
          requires:
            - build-and-push
      - notify:
          requires:
            - deploy